name: Publicar site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Baixar arquivos
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Preparar site
        run: |
          mkdir public
          cp missoes_interativas_pensamento_computacional.html public/
          cp README.md public/
          touch public/.nojekyll

      - name: Enviar pacote
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 1800000
